<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parroquia La Inmaculada Concepción</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background:white;
color:#333;
}

/* NAVBAR */

header{
background:#1f3c88;
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.logo{
font-size:20px;
font-weight:bold;
}

/* CONTENIDO (ejemplo de cuadros de texto) */

.container{
width:90%;
margin:auto;
padding:20px 0;
}

.cuadros{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
gap:20px;
}

.cuadro{
background:#f5f5f5;
padding:20px;
border-radius:10px;
text-align:center;
}

/* 🔵 SECCIÓN AZUL CORREGIDA (ÚNICO CAMBIO) */

.seccion-azul {
width: 100vw; /* ancho completo real */
background: #1f3c88;
padding: 8px 0; /* más delgado */

position: relative;
left: 50%;
transform: translateX(-50%);

display: flex;
justify-content: center;
align-items: center;
flex-wrap: wrap;
gap: 10px;
}

.seccion-azul a,
.seccion-azul button {
background: white;
color: #1f3c88;
border: none;
padding: 8px 12px;
text-decoration: none;
border-radius: 5px;
font-size: 14px;
cursor: pointer;
}

/* RESPONSIVE */

@media (max-width: 600px) {
.seccion-azul {
flex-direction: column;
}

.seccion-azul a,
.seccion-azul button {
width: 90%;
text-align: center;
}
}

</style>
</head>

<body>

<header>
<div class="navbar">
<div class="logo">Parroquia</div>
</div>
</header>

<div class="container">
<div class="cuadros">

<div class="cuadro">Contenido 1</div>
<div class="cuadro">Contenido 2</div>
<div class="cuadro">Contenido 3</div>

</div>
</div>

<!-- 🔵 SECCIÓN AZUL -->
<div class="seccion-azul">
<a href="#">Facebook</a>
<a href="#">YouTube</a>
<button>Donar</button>
<button>Contacto</button>
</div>

</body>
</html>
